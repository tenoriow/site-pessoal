<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Página não encontrada</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.container{
    text-align:center;
    margin-top:80px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #0f172a;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.container {
    flex: 1;
    max-width: 700px;
    margin: auto;
    text-align: center;
    padding: 40px 20px;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 1.1rem;
    color: #94a3b8;
    margin-bottom: 20px;
}

.description {
    margin-bottom: 30px;
    line-height: 1.6;
    color: #cbd5e1;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 0.95rem;
    transition: 0.2s ease;
}

.primary {
    background-color: #3b82f6;
    color: white;
}

.primary:hover {
    background-color: #2563eb;
}

.secondary {
    border: 1px solid #475569;
    color: #e2e8f0;
}

.secondary:hover {
    background-color: #1e293b;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 0.85rem;
    color: #64748b;
}</style>
</style>
</head>

<body>

<div class="container">
<h1>404</h1>
<h2>Página não encontrada</h2>

<p>... ou talvez você não deveria estar tentando acessar essa URL 👀</p>

<p>
<a href="/" class="btn primary">Voltar para a página inicial</a>
</p>
</div>

</body>
</html>
